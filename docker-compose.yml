services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aurelia_boutique
      POSTGRES_USER: aurelia
      POSTGRES_PASSWORD: aurelia_change_me
    volumes:
      - aurelia_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurelia -d aurelia_boutique"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      ENVIRONMENT: production
      SECRET_KEY: replace-with-a-long-production-secret
      DATABASE_URL: postgresql+psycopg://aurelia:aurelia_change_me@postgres:5432/aurelia_boutique
      CORS_ORIGINS: http://localhost:8080
      ADMIN_EMAIL: admin@aureliaboutique.com
      ADMIN_PASSWORD: ChangeMe123!
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  aurelia_postgres:
